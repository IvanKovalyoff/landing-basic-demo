<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Piekarnia Atelier — Landing BASIC</title>
    <meta name="description" content="Elegancki landing page (BASIC) dla małego biznesu — oferta, zaufanie i formularz kontaktowy." />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Piekarnia Atelier — Landing BASIC" />
    <meta property="og:description" content="Elegancki landing page (BASIC) dla małego biznesu — oferta, zaufanie i formularz kontaktowy." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Piekarnia Atelier — Landing BASIC" />
    <meta property="twitter:description" content="Elegancki landing page (BASIC) dla małego biznesu — oferta, zaufanie i formularz kontaktowy." />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Netlify Forms needs a static form in HTML at build time so it can detect and register fields -->
    <form 
      name="contact-basic" 
      data-netlify="true" 
      netlify-honeypot="bot-field" 
      action="/thanks.html"
      hidden
    >
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="checkbox" name="rodo-consent" />
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
